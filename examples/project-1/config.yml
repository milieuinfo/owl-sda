program-timeout-ms: 3800000

input-path: "examples/project-1/input.ttl"
output-path: "examples/project-1/output.ttl"
user-input: "Create a data example for a glass production facility. Introduce multiple versions of the operation in different years with different systems, processes and subprocesses."
user-context:
  - name: 'example file'
    path: 'examples/project-1/input-example.txt'
log-level: "INFO"

generation:
  data-richness: "minimal"

client:
  provider: "openai-compatible"
  openai-compatible:
    base-url: "http://192.168.1.5:18080/v1"
    api-key: "sk-local-placeholder"
  worker:
    provider: "openai-compatible"
    model: "qwen3.6:35b"
    timeout-ms: 350000
    between-message-timeout-ms: 200000
    batch-size: 1
    pool-count: 2
    context-window-tokens: 131072
  supervisor:
    provider: "openai-compatible"
    model: "qwen3.6:35b"
    timeout-ms: 360000
    context-window-tokens: 131072
  reviewer:
    provider: "openai-compatible"
    model: "qwen3-coder-next:80b"
    timeout-ms: 360000
    max-review-attempts: 3
    context-window-tokens: 131072

benchmark:
  enabled: true
  output-dir: "examples/project-1/benchmark/"

shacl:
  output-dir: "examples/project-1/shacl/"

reasoner:
  rules-file: "examples/project-1/reasoner.rules"
  reasoner-type: "owl"
  inferred-output-path: "examples/project-1/inferred.ttl"

extract:
  cache-dir: "examples/project-1/external/"
  cache-ttl-ms: 3600000
  mirrors:
    - uri: "http://www.w3.org/ns/prov#"
      mirrors:
        - "https://www.w3.org/ns/prov-o"
    - uri: "http://purl.org/net/p-plan#"
      mirrors:
        - "https://dgarijo.github.io/Vocabularies/P-PLAN/Releases/Release12032014/p-plan.owl"
    - uri: "http://www.w3.org/ns/sosa/prov"
      mirrors:
        - "https://raw.githubusercontent.com/w3c/sdw/refs/heads/gh-pages/ssn/rdf/sosa-prov-mapping.ttl"
    - uri: "http://qudt.org/schema/qudt/"
      mirrors:
        - "https://raw.githubusercontent.com/qudt/qudt-public-repo/refs/heads/main/src/main/rdf/schema/SCHEMA_QUDT.ttl"
    - uri: "http://xmlns.com/foaf/0.1/"
      mirrors:
        - "https://xmlns.com/foaf/spec/index.rdf"
    - uri: "http://www.w3.org/ns/locn#"
      mirrors:
        - "https://www.w3.org/ns/legacy_locn.ttl"
    - uri: "http://www.w3.org/ns/adms#"
      mirrors:
        - "https://www.w3.org/ns/legacy_adms.ttl"
    - uri: "http://dbpedia.org/ontology/"
      mirrors:
        - "https://downloads.dbpedia.org/2016-10/dbpedia_2016-10.nt"
    - uri: "http://www.opengis.net/ont/geosparql#"
      mirrors:
        - "https://raw.githubusercontent.com/opengeospatial/ogc-geosparql/refs/heads/master/vocabularies/geo.ttl"